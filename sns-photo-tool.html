<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SNS投稿画像メーカー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #0f0f1a;
    color: #fff;
    min-height: 100vh;
    padding: 20px;
  }

  .app-header {
    text-align: center;
    padding: 20px 0 30px;
  }

  .app-header h1 {
    font-size: 22px;
    font-weight: 900;
    margin-bottom: 6px;
  }

  .app-header p {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
  }

  /* テンプレート選択 */
  .template-selector {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .template-btn {
    padding: 10px 20px;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .template-btn.active {
    border-color: #d4af37;
    background: rgba(212,175,55,0.15);
    color: #d4af37;
  }

  /* アップロードエリア */
  .upload-section {
    max-width: 500px;
    margin: 0 auto 24px;
  }

  .upload-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }

  .upload-box {
    flex: 1;
    aspect-ratio: 1;
    border: 2px dashed rgba(255,255,255,0.2);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    overflow: hidden;
    position: relative;
    background: rgba(255,255,255,0.03);
  }

  .upload-box:hover {
    border-color: rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.06);
  }

  .upload-box.has-image {
    border-style: solid;
    border-color: #d4af37;
  }

  .upload-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0; left: 0;
  }

  .upload-label {
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.4);
    margin-top: 8px;
    position: relative;
    z-index: 1;
  }

  .upload-icon {
    width: 40px;
    height: 40px;
    position: relative;
    z-index: 1;
  }

  .upload-box.has-image .upload-label,
  .upload-box.has-image .upload-icon { display: none; }

  /* 単一写真用 */
  .upload-single {
    max-width: 300px;
    margin: 0 auto 16px;
  }

  .upload-single .upload-box {
    aspect-ratio: 1;
  }

  /* テキスト入力 */
  .input-group {
    max-width: 500px;
    margin: 0 auto 12px;
  }

  .input-group label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    margin-bottom: 6px;
  }

  .input-group input, .input-group select {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-group input:focus, .input-group select:focus {
    border-color: #d4af37;
  }

  .input-group input::placeholder {
    color: rgba(255,255,255,0.25);
  }

  .input-row {
    display: flex;
    gap: 12px;
    max-width: 500px;
    margin: 0 auto 12px;
  }

  .input-row .input-group {
    flex: 1;
    margin: 0;
  }

  /* カラー選択 */
  .color-selector {
    display: flex;
    gap: 8px;
    max-width: 500px;
    margin: 0 auto 24px;
    justify-content: center;
  }

  .color-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }

  .color-btn.active {
    border-color: #fff;
    transform: scale(1.15);
  }

  /* プレビュー */
  .preview-section {
    max-width: 500px;
    margin: 0 auto 24px;
    text-align: center;
  }

  .preview-label {
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .preview-wrap {
    border-radius: 16px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.1);
  }

  canvas {
    width: 100%;
    height: auto;
    display: block;
  }

  /* ボタン */
  .action-buttons {
    display: flex;
    gap: 12px;
    max-width: 500px;
    margin: 0 auto;
    justify-content: center;
  }

  .btn-action {
    padding: 14px 32px;
    border: none;
    border-radius: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-action:hover { transform: translateY(-2px); }
  .btn-action:active { transform: translateY(0); }

  .btn-download-img {
    background: linear-gradient(135deg, #d4af37, #b8962e);
    color: #fff;
    flex: 1;
  }

  .btn-reset {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
    padding: 14px 20px;
  }

  /* 非表示ファイル入力 */
  input[type="file"] { display: none; }

  /* テンプレート別の表示制御 */
  .hide { display: none !important; }
</style>
</head>
<body>

<div class="app-header">
  <h1>SNS投稿画像メーカー</h1>
  <p>写真を入れるだけでプロっぽい投稿画像が完成</p>
</div>

<!-- テンプレート選択 -->
<div class="template-selector">
  <button class="template-btn active" data-template="beforeafter">Before / After</button>
  <button class="template-btn" data-template="menu">メニュー紹介</button>
  <button class="template-btn" data-template="recruit">スタッフ募集</button>
</div>

<!-- Before/After用 写真アップロード -->
<div class="upload-section" id="upload-ba">
  <div class="upload-row">
    <div class="upload-box" id="box-before" onclick="document.getElementById('file-before').click()">
      <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      <span class="upload-label">Before</span>
    </div>
    <div class="upload-box" id="box-after" onclick="document.getElementById('file-after').click()">
      <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      <span class="upload-label">After</span>
    </div>
  </div>
</div>

<!-- メニュー/求人用 写真アップロード -->
<div class="upload-section hide" id="upload-single">
  <div class="upload-single">
    <div class="upload-box" id="box-single" onclick="document.getElementById('file-single').click()">
      <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      <span class="upload-label">写真を選択</span>
    </div>
  </div>
</div>

<input type="file" id="file-before" accept="image/*">
<input type="file" id="file-after" accept="image/*">
<input type="file" id="file-single" accept="image/*">

<!-- Before/After テキスト -->
<div id="inputs-ba">
  <div class="input-group">
    <label>サロン名</label>
    <input type="text" id="salon-name" placeholder="例：LANIKAI">
  </div>
</div>

<!-- メニュー用テキスト -->
<div id="inputs-menu" class="hide">
  <div class="input-group">
    <label>サロン名</label>
    <input type="text" id="menu-salon" placeholder="例：LANIKAI">
  </div>
  <div class="input-group">
    <label>メニュー名</label>
    <input type="text" id="menu-name" placeholder="例：フラットラッシュ 120本">
  </div>
  <div class="input-row">
    <div class="input-group">
      <label>価格</label>
      <input type="text" id="menu-price" placeholder="例：¥6,000">
    </div>
    <div class="input-group">
      <label>施術時間</label>
      <input type="text" id="menu-time" placeholder="例：60分">
    </div>
  </div>
</div>

<!-- 求人用テキスト -->
<div id="inputs-recruit" class="hide">
  <div class="input-group">
    <label>サロン名</label>
    <input type="text" id="recruit-salon" placeholder="例：LANIKAI">
  </div>
  <div class="input-group">
    <label>募集内容</label>
    <input type="text" id="recruit-title" placeholder="例：アイリスト募集（業務委託）">
  </div>
  <div class="input-group">
    <label>条件・アピール</label>
    <input type="text" id="recruit-detail" placeholder="例：歩合45%〜 / 週1日からOK">
  </div>
</div>

<!-- カラー選択 -->
<div class="color-selector">
  <div class="color-btn active" style="background:#1e3a5f" data-color="#1e3a5f" onclick="selectColor(this)"></div>
  <div class="color-btn" style="background:#d4af37" data-color="#d4af37" onclick="selectColor(this)"></div>
  <div class="color-btn" style="background:#2d2d2d" data-color="#2d2d2d" onclick="selectColor(this)"></div>
  <div class="color-btn" style="background:#8b5e3c" data-color="#8b5e3c" onclick="selectColor(this)"></div>
  <div class="color-btn" style="background:#c44569" data-color="#c44569" onclick="selectColor(this)"></div>
  <div class="color-btn" style="background:#546e7a" data-color="#546e7a" onclick="selectColor(this)"></div>
</div>

<!-- プレビュー -->
<div class="preview-section">
  <div class="preview-label">PREVIEW</div>
  <div class="preview-wrap">
    <canvas id="canvas" width="1080" height="1080"></canvas>
  </div>
</div>

<!-- ボタン -->
<div class="action-buttons">
  <button class="btn-action btn-reset" onclick="resetAll()">リセット</button>
  <button class="btn-action btn-download-img" onclick="downloadImage()">画像を保存</button>
</div>

<script>
let currentTemplate = 'beforeafter';
let accentColor = '#1e3a5f';
let imgBefore = null, imgAfter = null, imgSingle = null;

// テンプレート切り替え
document.querySelectorAll('.template-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentTemplate = this.dataset.template;

    // 表示切り替え
    document.getElementById('upload-ba').classList.toggle('hide', currentTemplate !== 'beforeafter');
    document.getElementById('upload-single').classList.toggle('hide', currentTemplate === 'beforeafter');
    document.getElementById('inputs-ba').classList.toggle('hide', currentTemplate !== 'beforeafter');
    document.getElementById('inputs-menu').classList.toggle('hide', currentTemplate !== 'menu');
    document.getElementById('inputs-recruit').classList.toggle('hide', currentTemplate !== 'recruit');

    render();
  });
});

// ファイルアップロード
document.getElementById('file-before').addEventListener('change', function(e) {
  loadImage(e, 'before');
});
document.getElementById('file-after').addEventListener('change', function(e) {
  loadImage(e, 'after');
});
document.getElementById('file-single').addEventListener('change', function(e) {
  loadImage(e, 'single');
});

function loadImage(e, type) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      if (type === 'before') {
        imgBefore = img;
        showPreview('box-before', ev.target.result);
      } else if (type === 'after') {
        imgAfter = img;
        showPreview('box-after', ev.target.result);
      } else {
        imgSingle = img;
        showPreview('box-single', ev.target.result);
      }
      render();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function showPreview(boxId, src) {
  const box = document.getElementById(boxId);
  box.classList.add('has-image');
  let img = box.querySelector('img');
  if (!img) {
    img = document.createElement('img');
    box.appendChild(img);
  }
  img.src = src;
}

// カラー選択
function selectColor(el) {
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  accentColor = el.dataset.color;
  render();
}

// テキスト入力で再描画
document.querySelectorAll('input').forEach(input => {
  input.addEventListener('input', render);
});

// メイン描画
function render() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 1080;
  canvas.height = 1080;

  if (currentTemplate === 'beforeafter') {
    renderBeforeAfter(ctx);
  } else if (currentTemplate === 'menu') {
    renderMenu(ctx);
  } else if (currentTemplate === 'recruit') {
    renderRecruit(ctx);
  }
}

function drawImageCover(ctx, img, x, y, w, h) {
  const imgRatio = img.width / img.height;
  const boxRatio = w / h;
  let sx, sy, sw, sh;
  if (imgRatio > boxRatio) {
    sh = img.height;
    sw = sh * boxRatio;
    sx = (img.width - sw) / 2;
    sy = 0;
  } else {
    sw = img.width;
    sh = sw / boxRatio;
    sx = 0;
    sy = (img.height - sh) / 2;
  }
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return { r, g, b };
}

function renderBeforeAfter(ctx) {
  // 背景
  ctx.fillStyle = accentColor;
  ctx.fillRect(0, 0, 1080, 1080);

  // タイトルバー
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(0, 0, 1080, 100);

  ctx.fillStyle = '#fff';
  ctx.font = '900 42px "Noto Sans JP"';
  ctx.textAlign = 'center';
  ctx.fillText('Before & After', 540, 65);

  // 写真エリア
  const photoY = 130;
  const photoH = 680;
  const photoW = 490;
  const gap = 20;

  // Before
  ctx.save();
  roundRect(ctx, 40, photoY, photoW, photoH, 20);
  ctx.clip();
  if (imgBefore) {
    drawImageCover(ctx, imgBefore, 40, photoY, photoW, photoH);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(40, photoY, photoW, photoH);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.font = '700 24px "Noto Sans JP"';
    ctx.fillText('Before', 40 + photoW/2, photoY + photoH/2);
  }
  ctx.restore();

  // After
  ctx.save();
  roundRect(ctx, 40 + photoW + gap, photoY, photoW, photoH, 20);
  ctx.clip();
  if (imgAfter) {
    drawImageCover(ctx, imgAfter, 40 + photoW + gap, photoY, photoW, photoH);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(40 + photoW + gap, photoY, photoW, photoH);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.font = '700 24px "Noto Sans JP"';
    ctx.fillText('After', 40 + photoW + gap + photoW/2, photoY + photoH/2);
  }
  ctx.restore();

  // ラベル
  // Before ラベル
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  roundRect(ctx, 60, photoY + 20, 130, 44, 22);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '800 20px "Noto Sans JP"';
  ctx.textAlign = 'center';
  ctx.fillText('Before', 125, photoY + 49);

  // After ラベル
  ctx.fillStyle = '#d4af37';
  roundRect(ctx, 40 + photoW + gap + 20, photoY + 20, 110, 44, 22);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillText('After', 40 + photoW + gap + 75, photoY + 49);

  // 中央の区切り線
  ctx.fillStyle = '#fff';
  ctx.fillRect(537, photoY + 30, 6, photoH - 60);

  // サロン名
  const salonName = document.getElementById('salon-name').value || '';
  if (salonName) {
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(0, 860, 1080, 120);

    ctx.fillStyle = '#d4af37';
    ctx.font = '900 36px "Noto Sans JP"';
    ctx.textAlign = 'center';
    ctx.fillText(salonName, 540, 935);
  }

  // 下部ライン
  ctx.fillStyle = '#d4af37';
  ctx.fillRect(0, 1060, 1080, 20);
}

function renderMenu(ctx) {
  // 背景
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, 1080, 1080);

  // 写真
  if (imgSingle) {
    ctx.save();
    roundRect(ctx, 0, 0, 1080, 720, 0);
    ctx.clip();
    drawImageCover(ctx, imgSingle, 0, 0, 1080, 720);
    ctx.restore();

    // グラデーションオーバーレイ
    const grad = ctx.createLinearGradient(0, 500, 0, 720);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 500, 1080, 220);
  } else {
    ctx.fillStyle = '#f0f0f0';
    ctx.fillRect(0, 0, 1080, 720);
    ctx.fillStyle = '#ccc';
    ctx.font = '700 24px "Noto Sans JP"';
    ctx.textAlign = 'center';
    ctx.fillText('写真をアップロード', 540, 360);
  }

  // 下部情報エリア
  ctx.fillStyle = accentColor;
  ctx.fillRect(0, 720, 1080, 360);

  // メニュー名
  const menuName = document.getElementById('menu-name').value || 'メニュー名';
  ctx.fillStyle = '#fff';
  ctx.font = '900 44px "Noto Sans JP"';
  ctx.textAlign = 'center';
  ctx.fillText(menuName, 540, 810);

  // 価格と時間
  const price = document.getElementById('menu-price').value || '';
  const time = document.getElementById('menu-time').value || '';
  const info = [price, time].filter(Boolean).join('  |  ');

  if (info) {
    ctx.fillStyle = '#d4af37';
    ctx.font = '800 38px "Noto Sans JP"';
    ctx.fillText(info, 540, 880);
  }

  // サロン名
  const salonName = document.getElementById('menu-salon').value || '';
  if (salonName) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '700 28px "Noto Sans JP"';
    ctx.fillText(salonName, 540, 960);
  }

  // アクセントライン
  ctx.fillStyle = '#d4af37';
  ctx.fillRect(390, 830, 300, 4);
}

function renderRecruit(ctx) {
  // 背景
  if (imgSingle) {
    drawImageCover(ctx, imgSingle, 0, 0, 1080, 1080);
    // 暗いオーバーレイ
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, 1080, 1080);
  } else {
    ctx.fillStyle = accentColor;
    ctx.fillRect(0, 0, 1080, 1080);
  }

  // 上部バッジ
  ctx.fillStyle = '#d4af37';
  roundRect(ctx, 370, 200, 340, 56, 28);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '800 24px "Noto Sans JP"';
  ctx.textAlign = 'center';
  ctx.fillText('STAFF WANTED', 540, 237);

  // 募集タイトル
  const title = document.getElementById('recruit-title').value || 'スタッフ募集';
  ctx.fillStyle = '#fff';
  ctx.font = '900 52px "Noto Sans JP"';
  ctx.fillText(title, 540, 400);

  // 区切り線
  ctx.fillStyle = '#d4af37';
  ctx.fillRect(390, 440, 300, 4);

  // 条件
  const detail = document.getElementById('recruit-detail').value || '';
  if (detail) {
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = '700 34px "Noto Sans JP"';
    ctx.fillText(detail, 540, 530);
  }

  // サロン名
  const salonName = document.getElementById('recruit-salon').value || '';
  if (salonName) {
    ctx.fillStyle = '#d4af37';
    ctx.font = '900 40px "Noto Sans JP"';
    ctx.fillText(salonName, 540, 800);
  }

  // 下部ライン
  ctx.fillStyle = '#d4af37';
  ctx.fillRect(0, 1050, 1080, 30);
}

function downloadImage() {
  const canvas = document.getElementById('canvas');
  const link = document.createElement('a');
  const templates = { beforeafter: 'before-after', menu: 'menu', recruit: 'recruit' };
  link.download = `sns-post-${templates[currentTemplate]}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function resetAll() {
  imgBefore = null;
  imgAfter = null;
  imgSingle = null;
  ['box-before', 'box-after', 'box-single'].forEach(id => {
    const box = document.getElementById(id);
    if (box) {
      box.classList.remove('has-image');
      const img = box.querySelector('img');
      if (img) img.remove();
    }
  });
  document.querySelectorAll('input[type="text"]').forEach(el => el.value = '');
  ['file-before', 'file-after', 'file-single'].forEach(id => {
    document.getElementById(id).value = '';
  });
  render();
}

// 初期描画
render();
</script>

</body>
